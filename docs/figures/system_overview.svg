<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Motion-aware wearable physiological monitoring overview</title>
  <desc id="desc">A headband and wristband stream PPG and IMU signals into motion-aware processing for breathing-rate and heart-rate estimation.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L10,5.5 L0,11 Z" fill="#2f6fb0"/>
    </marker>
    <marker id="arrow-teal" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L10,5.5 L0,11 Z" fill="#157f78"/>
    </marker>
    <marker id="arrow-purple" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L10,5.5 L0,11 Z" fill="#8d4aa8"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#1f2d3d" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="processor-grad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#ecf5f4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" fill="#ffffff"/>
  <rect x="28" y="30" width="1344" height="500" rx="24" fill="#f7f9fb" stroke="#d7e0ea"/>

  <text x="700" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#18212b">
    Motion-Aware Wearable Physiological Monitoring
  </text>
  <text x="700" y="100" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#526273">
    PPG + IMU streams for sleep-focused heart-rate and breathing-rate estimation
  </text>

  <!-- Person and wearable sensors -->
  <g transform="translate(70,125)">
    <rect x="8" y="0" width="300" height="355" rx="18" fill="#ffffff" stroke="#d7e0ea" filter="url(#soft-shadow)"/>
    <text x="158" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2d3d">Wearable Sensing</text>

    <!-- simple person -->
    <circle cx="155" cy="96" r="42" fill="#f4d7c4" stroke="#6d4d40" stroke-width="2"/>
    <path d="M111 90 C126 56, 182 55, 199 89" fill="none" stroke="#2c3036" stroke-width="9" stroke-linecap="round"/>
    <rect x="112" y="78" width="86" height="13" rx="6.5" fill="#4aa3df" stroke="#246b94" stroke-width="2"/>
    <circle cx="128" cy="84" r="5" fill="#ffffff"/>
    <circle cx="182" cy="84" r="5" fill="#ffffff"/>

    <path d="M117 156 C108 199, 105 250, 127 301 L185 301 C207 250, 204 199, 193 156 Z" fill="#dfeaf6" stroke="#526273" stroke-width="2"/>
    <path d="M117 176 C82 205, 78 246, 105 276" fill="none" stroke="#f4d7c4" stroke-width="19" stroke-linecap="round"/>
    <path d="M193 176 C234 204, 242 245, 211 276" fill="none" stroke="#f4d7c4" stroke-width="19" stroke-linecap="round"/>
    <rect x="204" y="262" width="42" height="20" rx="10" fill="#68b86b" stroke="#2e7d32" stroke-width="2" transform="rotate(-10 225 272)"/>
    <circle cx="225" cy="272" r="6" fill="#ffffff"/>

    <!-- sleep context -->
    <path d="M56 304 C68 290, 88 288, 102 302 C91 304, 80 314, 76 327 C67 323, 60 315, 56 304 Z" fill="#9fb6d8" opacity="0.75"/>
    <text x="158" y="333" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#526273">headband + wrist wearable</text>

    <!-- signal callouts -->
    <g>
      <path d="M198 83 C245 74, 265 66, 299 54" fill="none" stroke="#2f6fb0" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
      <rect x="215" y="35" width="85" height="36" rx="8" fill="#edf5ff" stroke="#8ab6df"/>
      <text x="257" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2f6fb0">Head PPG</text>
    </g>
    <g>
      <path d="M218 270 C250 247, 268 226, 301 204" fill="none" stroke="#157f78" stroke-width="2.5" marker-end="url(#arrow-teal)"/>
      <rect x="211" y="183" width="91" height="36" rx="8" fill="#ebfaf7" stroke="#84c7be"/>
      <text x="256" y="206" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#157f78">Wrist IMU</text>
    </g>
    <g>
      <path d="M198 96 C238 105, 267 118, 300 134" fill="none" stroke="#2f6fb0" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
      <rect x="215" y="119" width="88" height="36" rx="8" fill="#edf5ff" stroke="#8ab6df"/>
      <text x="259" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2f6fb0">Wrist PPG</text>
    </g>
    <g>
      <path d="M119 83 C78 95, 53 113, 25 136" fill="none" stroke="#157f78" stroke-width="2.5" marker-end="url(#arrow-teal)"/>
      <rect x="22" y="118" width="83" height="36" rx="8" fill="#ebfaf7" stroke="#84c7be"/>
      <text x="64" y="141" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#157f78">Head IMU</text>
    </g>
  </g>

  <!-- Signal stream arrows -->
  <path d="M380 245 C420 245, 435 245, 470 245" fill="none" stroke="#2f6fb0" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M380 287 C420 287, 435 287, 470 287" fill="none" stroke="#157f78" stroke-width="3" marker-end="url(#arrow-teal)"/>
  <text x="418" y="227" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#526273">PPG</text>
  <text x="418" y="308" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#526273">IMU</text>

  <!-- Processing pipeline -->
  <g transform="translate(470,135)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="345" height="345" rx="18" fill="url(#processor-grad)" stroke="#c6d6e5"/>
    <text x="172" y="36" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2d3d">Motion-Aware Processing</text>

    <g transform="translate(35,65)">
      <rect x="0" y="0" width="275" height="52" rx="10" fill="#ffffff" stroke="#cbd9e7"/>
      <text x="20" y="23" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2f6fb0">1. Stream alignment</text>
      <text x="20" y="41" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#526273">synchronized PPG and IMU windows</text>
    </g>

    <g transform="translate(35,135)">
      <rect x="0" y="0" width="275" height="52" rx="10" fill="#ffffff" stroke="#cbd9e7"/>
      <text x="20" y="23" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#157f78">2. Signal quality + motion checks</text>
      <text x="20" y="41" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#526273">dropouts, amplitude, movement artifacts</text>
    </g>

    <g transform="translate(35,205)">
      <rect x="0" y="0" width="275" height="52" rx="10" fill="#ffffff" stroke="#cbd9e7"/>
      <text x="20" y="23" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#8d4aa8">3. Estimation engines</text>
      <text x="20" y="41" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#526273">Core ML BR model + HR signal pipeline</text>
    </g>

    <g transform="translate(35,282)">
      <path d="M0 0 C35 -17, 61 17, 96 0 S157 17, 192 0 S240 11, 275 0" fill="none" stroke="#2f6fb0" stroke-width="2.2"/>
      <path d="M0 18 C35 1, 61 35, 96 18 S157 35, 192 18 S240 29, 275 18" fill="none" stroke="#157f78" stroke-width="2.2"/>
      <text x="137" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#526273">physiology separated from motion</text>
    </g>
  </g>

  <!-- Outputs -->
  <path d="M815 220 C900 220, 955 190, 1030 173" fill="none" stroke="#8d4aa8" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <path d="M815 313 C900 313, 955 337, 1030 357" fill="none" stroke="#8d4aa8" stroke-width="3" marker-end="url(#arrow-purple)"/>

  <g transform="translate(1030,130)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="250" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
    <circle cx="44" cy="48" r="22" fill="#ffe8f3" stroke="#b23a8a"/>
    <path d="M27 48 C34 38, 39 58, 45 48 S57 38, 64 48" fill="none" stroke="#b23a8a" stroke-width="3"/>
    <text x="82" y="44" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2d3d">Breathing Rate</text>
    <text x="82" y="68" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#526273">breaths per minute</text>
    <text x="82" y="91" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#526273">real-time model inference</text>
  </g>

  <g transform="translate(1030,308)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="250" height="120" rx="18" fill="#ffffff" stroke="#d7e0ea"/>
    <circle cx="44" cy="48" r="22" fill="#eaf3ff" stroke="#2f6fb0"/>
    <path d="M27 52 L36 52 L41 38 L49 65 L56 52 L65 52" fill="none" stroke="#2f6fb0" stroke-width="3" stroke-linejoin="round"/>
    <text x="82" y="44" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2d3d">Heart Rate</text>
    <text x="82" y="68" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#526273">beats per minute</text>
    <text x="82" y="91" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#526273">motion-aware PPG tracking</text>
  </g>

  <!-- Validation strip -->
  <g transform="translate(500,495)">
    <rect x="0" y="0" width="400" height="28" rx="14" fill="#ffffff" stroke="#d7e0ea"/>
    <text x="200" y="19" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#526273">
      Offline reference comparison and real-time mobile deployment prototypes
    </text>
  </g>
</svg>
