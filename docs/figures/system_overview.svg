<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="650" viewBox="0 0 1400 650" role="img" aria-labelledby="title desc">
  <title id="title">Motion-aware wearable physiological monitoring overview</title>
  <desc id="desc">A sleeping user wearing a headband and wrist wearable streams PPG and IMU waveforms into motion-aware processing, producing clean signals for breathing-rate and heart-rate estimation.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L11,6 L0,12 Z" fill="#2b6cb0"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L11,6 L0,12 Z" fill="#14847c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L11,6 L0,12 Z" fill="#8f46ad"/>
    </marker>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L11,6 L0,12 Z" fill="#536273"/>
    </marker>
    <filter id="card-shadow" x="-12%" y="-12%" width="124%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1d2b3a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="sleep-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#edf4fb"/>
    </linearGradient>
    <linearGradient id="process-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef8f5"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="650" fill="#ffffff"/>

  <text x="700" y="54" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#17212d">
    Motion-Aware Wearable Physiological Monitoring
  </text>
  <text x="700" y="83" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#536273">
    PPG + IMU streams during sleep are cleaned and interpreted for real-time breathing-rate and heart-rate estimation
  </text>

  <!-- Left: wearable user -->
  <g transform="translate(62,132)">
    <rect x="0" y="0" width="300" height="410" rx="18" fill="url(#sleep-bg)" stroke="#d7e3ef" filter="url(#card-shadow)"/>
    <text x="150" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17212d">Wearable Streams</text>

    <!-- pillow and bed -->
    <rect x="42" y="285" width="220" height="72" rx="28" fill="#d9e6f5" stroke="#b8c9df"/>
    <ellipse cx="100" cy="284" rx="70" ry="34" fill="#f1f6fb" stroke="#d4e1ee"/>

    <!-- sleeping person in side view -->
    <path d="M94 202 C116 170, 163 154, 207 174 C242 190, 254 230, 235 260 C207 305, 129 307, 90 270 C70 250, 72 226, 94 202 Z" fill="#f5d7c4" stroke="#765547" stroke-width="2.4"/>
    <path d="M90 204 C118 151, 190 145, 226 182 C190 163, 136 165, 101 213 Z" fill="#27313d"/>
    <path d="M89 216 C124 203, 178 200, 224 214" fill="none" stroke="#42a4d8" stroke-width="14" stroke-linecap="round"/>
    <path d="M89 216 C124 203, 178 200, 224 214" fill="none" stroke="#236e96" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="121" cy="209" r="5.5" fill="#ffffff"/>
    <circle cx="194" cy="211" r="5.5" fill="#ffffff"/>
    <path d="M188 240 C170 252, 142 251, 125 239" fill="none" stroke="#6e4f43" stroke-width="2.2" stroke-linecap="round"/>

    <!-- blanket/body -->
    <path d="M67 297 C100 240, 194 232, 252 291 C241 359, 101 374, 67 297 Z" fill="#b8cbe2" stroke="#6a7d91" stroke-width="2.4"/>

    <!-- arm with wrist wearable -->
    <path d="M214 257 C245 264, 262 287, 268 321" fill="none" stroke="#f5d7c4" stroke-width="20" stroke-linecap="round"/>
    <rect x="249" y="301" width="54" height="25" rx="12" fill="#65b76a" stroke="#2f7f37" stroke-width="2.3" transform="rotate(8 276 313)"/>
    <circle cx="276" cy="314" r="7" fill="#ffffff"/>

    <!-- sensor labels placed away from arrows -->
    <g transform="translate(40,72)">
      <rect x="0" y="0" width="92" height="34" rx="8" fill="#eef7ff" stroke="#8ab8df"/>
      <text x="46" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="700" fill="#2b6cb0">Head PPG</text>
    </g>
    <g transform="translate(162,72)">
      <rect x="0" y="0" width="92" height="34" rx="8" fill="#eaf9f6" stroke="#86c9c1"/>
      <text x="46" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="700" fill="#14847c">Head IMU</text>
    </g>
    <g transform="translate(28,370)">
      <rect x="0" y="0" width="96" height="34" rx="8" fill="#eef7ff" stroke="#8ab8df"/>
      <text x="48" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="700" fill="#2b6cb0">Wrist PPG</text>
    </g>
    <g transform="translate(176,370)">
      <rect x="0" y="0" width="96" height="34" rx="8" fill="#eaf9f6" stroke="#86c9c1"/>
      <text x="48" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="700" fill="#14847c">Wrist IMU</text>
    </g>

    <!-- small unobtrusive pointers to actual sensors -->
    <path d="M86 106 C106 128, 113 166, 121 201" fill="none" stroke="#2b6cb0" stroke-width="2" stroke-dasharray="4 4"/>
    <path d="M209 106 C209 132, 207 169, 206 206" fill="none" stroke="#14847c" stroke-width="2" stroke-dasharray="4 4"/>
    <path d="M80 370 C128 345, 209 323, 249 313" fill="none" stroke="#2b6cb0" stroke-width="2" stroke-dasharray="4 4"/>
    <path d="M224 370 C238 348, 259 325, 276 314" fill="none" stroke="#14847c" stroke-width="2" stroke-dasharray="4 4"/>
  </g>

  <!-- Raw signal panel -->
  <g transform="translate(412,124)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="280" height="426" rx="18" fill="#ffffff" stroke="#d7e3ef"/>
    <text x="140" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17212d">Motion-Contaminated Inputs</text>
    <text x="140" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#536273">streamed from headband + wrist wearable</text>

    <g transform="translate(26,88)">
      <text x="0" y="-12" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2b6cb0">PPG waveform</text>
      <rect x="0" y="0" width="228" height="104" rx="10" fill="#f8fbff" stroke="#d7e3ef"/>
      <path d="M10 58 C25 38, 40 76, 55 56 S83 36, 98 58 S128 78, 142 55 S168 36, 181 58 S208 78, 218 56" fill="none" stroke="#2b6cb0" stroke-width="3"/>
      <path d="M73 56 L78 23 L84 84 L90 42 L96 58" fill="none" stroke="#d65656" stroke-width="2.4"/>
      <path d="M154 57 L160 18 L166 91 L173 43 L180 58" fill="none" stroke="#d65656" stroke-width="2.4"/>
      <text x="114" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7a4b4b">motion spikes + baseline shifts</text>
    </g>

    <g transform="translate(26,235)">
      <text x="0" y="-12" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#14847c">IMU waveform</text>
      <rect x="0" y="0" width="228" height="104" rx="10" fill="#f7fcfb" stroke="#d7e3ef"/>
      <path d="M10 57 C30 40, 49 74, 70 57 S110 40, 131 57 S172 74, 193 57 S213 42, 218 51" fill="none" stroke="#14847c" stroke-width="3"/>
      <path d="M94 57 L101 26 L108 82 L115 32 L123 72 L132 47" fill="none" stroke="#d65656" stroke-width="2.4"/>
      <text x="114" y="92" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#536273">movement context</text>
    </g>
  </g>

  <!-- arrows from wearable to raw panel -->
  <path d="M362 270 C382 270, 392 270, 412 270" fill="none" stroke="#536273" stroke-width="3" marker-end="url(#arrow-dark)"/>
  <text x="387" y="253" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#536273">live streams</text>

  <!-- Processing panel -->
  <g transform="translate(762,124)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="300" height="426" rx="18" fill="url(#process-bg)" stroke="#d7e3ef"/>
    <text x="150" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17212d">Motion-Aware Processing</text>
    <text x="150" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#536273">quality gating + artifact suppression</text>

    <g transform="translate(30,88)">
      <rect x="0" y="0" width="240" height="54" rx="10" fill="#ffffff" stroke="#cbd9e7"/>
      <text x="18" y="23" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2b6cb0">1. Align signal windows</text>
      <text x="18" y="41" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#536273">PPG and IMU synchronized in time</text>
    </g>
    <g transform="translate(30,162)">
      <rect x="0" y="0" width="240" height="54" rx="10" fill="#ffffff" stroke="#cbd9e7"/>
      <text x="18" y="23" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#14847c">2. Detect motion artifacts</text>
      <text x="18" y="41" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#536273">dropouts, low amplitude, movement peaks</text>
    </g>
    <g transform="translate(30,236)">
      <rect x="0" y="0" width="240" height="54" rx="10" fill="#ffffff" stroke="#cbd9e7"/>
      <text x="18" y="23" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#8f46ad">3. Clean or reject windows</text>
      <text x="18" y="41" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#536273">retain reliable physiological content</text>
    </g>

    <g transform="translate(30,325)">
      <text x="0" y="-12" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#17212d">Cleaned signal windows</text>
      <rect x="0" y="0" width="240" height="70" rx="10" fill="#ffffff" stroke="#cbd9e7"/>
      <path d="M13 35 C30 18, 48 52, 66 35 S101 18, 119 35 S154 52, 172 35 S207 18, 227 35" fill="none" stroke="#2b6cb0" stroke-width="3"/>
      <path d="M13 52 C46 43, 73 62, 107 52 S168 42, 227 52" fill="none" stroke="#14847c" stroke-width="3"/>
    </g>
  </g>

  <!-- arrow raw to processing -->
  <path d="M692 270 C720 270, 734 270, 762 270" fill="none" stroke="#536273" stroke-width="3" marker-end="url(#arrow-dark)"/>
  <text x="727" y="253" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#536273">motion-aware</text>

  <!-- Estimation blocks -->
  <g transform="translate(1132,132)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="218" height="134" rx="18" fill="#ffffff" stroke="#d7e3ef"/>
    <circle cx="42" cy="48" r="22" fill="#ffe8f3" stroke="#b23a8a"/>
    <path d="M25 48 C32 38, 38 58, 45 48 S58 38, 65 48" fill="none" stroke="#b23a8a" stroke-width="3"/>
    <text x="82" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17212d">BR model</text>
    <text x="82" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#536273">Core ML inference</text>
    <text x="82" y="91" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#b23a8a">Breathing Rate</text>
    <text x="82" y="114" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#536273">breaths per minute</text>
  </g>

  <g transform="translate(1132,336)" filter="url(#card-shadow)">
    <rect x="0" y="0" width="218" height="134" rx="18" fill="#ffffff" stroke="#d7e3ef"/>
    <circle cx="42" cy="48" r="22" fill="#eaf3ff" stroke="#2b6cb0"/>
    <path d="M25 53 L34 53 L40 38 L48 65 L56 53 L65 53" fill="none" stroke="#2b6cb0" stroke-width="3" stroke-linejoin="round"/>
    <text x="82" y="38" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#17212d">HR pipeline</text>
    <text x="82" y="62" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#536273">PPG tracking</text>
    <text x="82" y="91" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#2b6cb0">Heart Rate</text>
    <text x="82" y="114" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#536273">beats per minute</text>
  </g>

  <path d="M1062 380 C1090 337, 1104 226, 1132 198" fill="none" stroke="#8f46ad" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <path d="M1062 380 C1095 399, 1105 403, 1132 403" fill="none" stroke="#2b6cb0" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <g transform="translate(447,590)">
    <rect x="0" y="0" width="506" height="28" rx="14" fill="#f6f9fc" stroke="#d7e3ef"/>
    <text x="253" y="19" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#536273">
      Prototyped on device with real-time streams and real-time estimates
    </text>
  </g>
</svg>
